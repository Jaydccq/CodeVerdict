slug: amazon-inventory-quality-conversion
source: amazon-oa
title: Optimal Inventory Quality Conversion Minimum Cost
difficulty: medium
description: |
  Convert all inventory qualities to one existing quality. Changing item i by one quality point costs cost[i]. Minimize total cost.
  
  This is a repository-authored Amazon OA practice adaptation. The fixtures are deterministic practice tests, not official hidden tests.
inputFormat: |
  Line 1: n. Line 2: qualities. Line 3: per-unit costs.
outputFormat: |
  Print the minimum conversion cost.
constraints: |
  1 <= n <= 200000.
samples:
  - input: |
      3
      1 3 5
      10 1 10
    output: |
      40
    explanation: |
      The output is produced by applying the rule described in the statement to the input instance.
  - input: |
      4
      2 4 8 10
      1 2 3 4
    output: |
      22
    explanation: |
      The output is produced by applying the rule described in the statement to the input instance.
supportedLanguages:
  - python
  - javascript
  - cpp
  - java
timeLimitMs: 2000
memoryLimitKb: 262144
