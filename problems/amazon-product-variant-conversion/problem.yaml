slug: amazon-product-variant-conversion
source: amazon-oa
title: Product Variant Conversion Minimum Cost
difficulty: medium
description: |
  Two product variant strings have equal length. Converting position i costs cost[i] if the characters differ. Compute total minimum conversion cost.
  
  This is a repository-authored Amazon OA practice adaptation. The fixtures are deterministic practice tests, not official hidden tests.
inputFormat: |
  Line 1: source string. Line 2: target string. Line 3: per-position costs.
outputFormat: |
  Print the total conversion cost.
constraints: |
  1 <= length <= 200000.
samples:
  - input: |
      abcde
      abfde
      1 2 3 4 5
    output: |
      3
    explanation: |
      The output is produced by applying the rule described in the statement to the input instance.
  - input: |
      aaaa
      bbbb
      5 6 7 8
    output: |
      26
    explanation: |
      The output is produced by applying the rule described in the statement to the input instance.
supportedLanguages:
  - python
  - javascript
  - cpp
  - java
timeLimitMs: 2000
memoryLimitKb: 262144
