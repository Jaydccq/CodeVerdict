slug: amazon-circular-array-query-distance
source: amazon-oa
title: Circular Array Prefix Sum Multi-query Distance
difficulty: medium
description: |
  Given distances between adjacent stops on a circle, answer several shortest-distance queries and return the sum of all query distances.
  
  This is a repository-authored Amazon OA practice adaptation. The fixtures are deterministic practice tests, not official hidden tests.
inputFormat: |
  Line 1: n. Line 2: n circular edge distances. Line 3: q. Next q lines: two 0-based stop indices.
outputFormat: |
  Print the sum of shortest circular distances over all queries.
constraints: |
  2 <= n <= 200000. 1 <= q <= 200000.
samples:
  - input: |
      4
      1 2 3 4
      2
      0 1
      1 3
    output: |
      6
    explanation: |
      The output is produced by applying the rule described in the statement to the input instance.
  - input: |
      3
      5 5 5
      3
      0 0
      0 2
      1 2
    output: |
      10
    explanation: |
      The output is produced by applying the rule described in the statement to the input instance.
supportedLanguages:
  - python
  - javascript
  - cpp
  - java
timeLimitMs: 2000
memoryLimitKb: 262144
