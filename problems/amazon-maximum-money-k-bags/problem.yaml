slug: amazon-maximum-money-k-bags
source: amazon-oa
title: Maximum Money by Taking K Consecutive Bags
difficulty: medium
description: |
  Given money in n bags arranged in a row, choose exactly k consecutive bags to maximize collected money.
  
  This is a repository-authored Amazon OA practice adaptation. The fixtures are deterministic practice tests, not official hidden tests.
inputFormat: |
  Line 1: n k. Line 2: n bag values.
outputFormat: |
  Print the maximum sum of any k consecutive bags.
constraints: |
  1 <= k <= n <= 200000.
samples:
  - input: |
      5 3
      2 1 5 1 3
    output: |
      9
    explanation: |
      The output is produced by applying the rule described in the statement to the input instance.
  - input: |
      4 2
      9 -1 4 7
    output: |
      11
    explanation: |
      The output is produced by applying the rule described in the statement to the input instance.
supportedLanguages:
  - python
  - javascript
  - cpp
  - java
timeLimitMs: 2000
memoryLimitKb: 262144
