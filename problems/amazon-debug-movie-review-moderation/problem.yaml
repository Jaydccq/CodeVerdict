slug: amazon-debug-movie-review-moderation
source: amazon-oa
questionType: debug-workspace
title: Movie Review Moderation Repository Debug
difficulty: medium
description: |
  You are given a movie-review moderation repository with failing tests around banned words and per-user rate limits.
  
  Known issues reported by the test suite:
  
  - banned words are checked case-sensitively
  - the rate-limit boundary is off by one
  - rejected reviews are still persisted
  
  Fix the moderation behavior so it matches the README.
inputFormat: |
  This problem does not use stdin/stdout input.
  Open the seeded repository workspace, read the README, inspect the allowed source files, and run the visible test suite from the practice workspace.
outputFormat: |
  There is no single textual output.
  Success is determined by the visible and hidden repository tests.
constraints: |
  - Only files declared editable by the workspace manifest may be modified.
  - The runtime environment is Node.js.
  - The seeded repository and tests are deterministic.
samples:
  - input: |
      Open README.md and the source files listed in the workspace editor.
    output: |
      After fixing the bugs, all visible tests should report PASS.
    explanation: |
      This workspace problem is graded by repository tests rather than stdin and stdout.
supportedLanguages:
  - javascript
timeLimitMs: 2000
memoryLimitKb: 262144
