slug: amazon-debug-return-system
source: amazon-oa
questionType: debug-workspace
title: Loan Software Repository Debug
difficulty: medium
description: |
  You are given a small loan-service repository with a few known production issues.
  The service is supposed to let a user create a loan, list their created loans,
  fund a loan from their account balance, and repay a funded loan.

  Known issues reported by the product team:

  - a user cannot create a loan successfully
  - a user cannot see already created loans
  - a user can fund a loan even when the account balance is insufficient

  Your task is to fix the repository by editing only the allowed files in the
  debug workspace. Preserve the intended balance-safety invariant across every
  debit path, not only the visible scenario above.

  This repository version is a normalized Amazon OA debug-workspace problem. The
  visible and hidden test suites are repository-authored practice tests, not
  official Amazon tests.
inputFormat: |
  This problem does not use stdin/stdout input.
  Open the seeded workspace files, edit the allowed files, and run the visible
  test suite from the practice workspace.
outputFormat: |
  There is no single textual output.
  Success is determined by the visible and hidden repository tests.
constraints: |
  - Only files declared editable by the workspace manifest may be modified.
  - The runtime environment is Node.js.
  - The seeded repository and tests are deterministic.
samples:
  - input: |
      Open the seeded repository workspace and inspect the loan repository and
      service files listed in the editor.
    output: |
      After fixing the bugs, all visible tests should report PASS.
    explanation: |
      This workspace problem is graded by repository tests rather than stdin and
      stdout. Use the visible test runner to verify that loan creation, loan
      listing, and insufficient-balance funding behavior are fixed.
supportedLanguages:
  - javascript
timeLimitMs: 2000
memoryLimitKb: 262144
