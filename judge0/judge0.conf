# Judge0 configuration
# https://github.com/judge0/judge0/blob/master/judge0.conf

# ── Database ──────────────────────────────────────────────────────────────────
POSTGRES_HOST=judge0-db
POSTGRES_PORT=5432
POSTGRES_DB=judge0
POSTGRES_USER=judge0
POSTGRES_PASSWORD=judge0

# ── Redis ─────────────────────────────────────────────────────────────────────
REDIS_HOST=judge0-redis
REDIS_PORT=6379

# ── Workers ───────────────────────────────────────────────────────────────────
# Single-user local practice does not need a multi-worker Judge0 cluster.
WORKERS_COUNT=1
MAX_QUEUE_SIZE=20

# ── Authentication ────────────────────────────────────────────────────────────
# No auth - Judge0 is on an isolated internal network not exposed to the host
AUTHN_HEADER=
AUTHN_TOKEN=

# ── Submission limits ─────────────────────────────────────────────────────────
MAX_CPU_TIME_LIMIT=10
MAX_CPU_EXTRA_TIME=5
MAX_WALL_TIME_LIMIT=20
MAX_MEMORY_LIMIT=262144
MAX_STACK_LIMIT=65536
MAX_MAX_PROCESSES_AND_OR_THREADS=60
MAX_ENABLE_PER_PROCESS_AND_THREAD_TIME_LIMIT=false
MAX_ENABLE_PER_PROCESS_AND_THREAD_MEMORY_LIMIT=false
MAX_FILE_SIZE=1024
MAX_NUMBER_OF_RUNS=5
MAX_STDIN_LENGTH=65536
MAX_STDOUT_LENGTH=65536
MAX_STDERR_LENGTH=65536

# ── Network access inside sandboxed submissions ───────────────────────────────
ENABLE_NETWORK=false
